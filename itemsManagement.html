<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Supermarket</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/css_bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
    <script src="js/scriptItemsManagement.js" type='module' defer></script>
    <script src="js/js_bootstrap/bootstrap.bundle.min.js" defer></script>
</head>
<body class="bg-gray">
    <div class="container my-sm-5">
        <div class="row rounded shadow px-3 py-4 bg-white">
           
            <!--HEADER-->
            <div class="col-sm text-center text-sm-start mb-2">
                <h2 id='namePurchase' class=""></h2>
                <h5 id='finalValue' class=""></h5>
                <h5 id='maxSpend' class=""></h5>
                <h5 id='itemsQuantity' class=""></h5>
            </div>
            <div class="col-sm text-center text-sm-end mb-3 mb-md-0">
                <a href="index.html" class="btn btn-danger">Voltar</a>
                <button id='btnAddItem' type="button" class="btn btn-primary"><i class="bi-plus-circle me-1"></i>Adicionar Item</button>
            </div>
                
            <div class="col-12"><hr></div>

            <div class="col-12">
                <div class="input-group">
                    <input id='searchInput' type="text" class="form-control" placeholder="Pesquisar Item..." aria-label="Recipient's username" aria-describedby="button-addon2">
                    <button class="btn btn-success" type="button" id="button-addon2"><i class="bi-search"></i></button>
                  </div>
            </div>
            
            <div class="col-12"><hr></div>

            <!--CARDS-->
            <main class="col-12">
                <div id='divItemsPurchase' class="row row-cols-1 row-cols-md-2 row-cols-lg-3">
                    <!-- ITEMS PURCHASE HERE! -->
                </div>
            </main>

        </div>
    </div>
</body>
</html>
